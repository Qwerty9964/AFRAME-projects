<html>

<head>
  <script src="https://aframe.io/releases/1.0.3/aframe.min.js"></script>
  <script src="game.js"></script>
</head>

<body>
    
    <a-scene>
        <a-entity camera look-controls>
            <a-entity cursor="fuse: false" position="0 0 -1" geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
             material="color: black; shader: flat">
            </a-entity>
        </a-entity>

        <a-sphere position = "0 1 -4" color ="blue" change-color></a-sphere>
        <a-box spin-box position="-2 1 -4"color="orange"></a-box>
        <a-sphere move-back position="2 0 -4" radius="0.75" color="green"></a-sphere>
        <a-box move-back position="2 0 -4" width="1.2" height="1.2" depth="1.2"color="purple"></a-box>

        <!--Extra Credit Below-->
        <a-sphere position = "4 0 -4" color="yellow" change-texture></a-sphere>


    </a-scene>
</body>

</html>
